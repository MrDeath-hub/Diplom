{% extends 'museum_app/base.html' %}
{% block title %}{{ news_item.title }}{% endblock %}

{% block content %}
<div class="col-md-8 offset-md-2">
    <h1>{{ news_item.title }}</h1>
    <p class="text-muted">{{ news_item.date_published|date:"d.m.Y" }}</p>
    {% if news_item.preview_image %}<img src="{{ news_item.preview_image.url }}" class="img-fluid mb-3">{% endif %}
    <div>{{ news_item.full_text|linebreaks }}</div>
    <a href="{% url 'museum_app:news_list' %}" class="btn btn-secondary mt-3">← Назад к новостям</a>
</div>
{% endblock %}
